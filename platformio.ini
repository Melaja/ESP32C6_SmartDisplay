; ============================================================
; PlatformIO project configuratie
; Project  : ESP32C6_SMARTDISPLAY
; Auteur   : JWP van Renen
; Versie   : v1.0.0
; Datum    : 2026-03-04
; Bord     : Waveshare ESP32-C6-Touch-LCD-1.47
; ============================================================

[platformio]
; lib_dir moet in [platformio] sectie staan (niet in [env:])
lib_dir = libraries

[env:esp32c6]
; Platform en framework
platform  = espressif32
board = esp32-c6-devkitc-1
framework = arduino

; ============================================================
; PROCESSOR INSTELLINGEN
; Reden voor 160MHz: maximale prestatie voor LVGL rendering
; en gelijktijdige WiFi/BLE operaties
; ============================================================
board_build.mcu       = esp32c6
board_build.f_cpu     = 160000000L
board_build.flash_size = 8MB
board_build.flash_freq = 80m
board_build.flash_mode = qio

; ============================================================
; SERIAL MONITOR
; ============================================================
monitor_speed  = 115200
monitor_filters = default

; Upload snelheid: 921600 voor snellere uploads tijdens ontwikkeling
upload_speed = 921600

; ============================================================
; BIBLIOTHEEK CONFIGURATIE
; ============================================================

; LDF (Library Dependency Finder) modus:
; deep+ = recursief zoeken naar dependencies in alle library-bestanden
; Dit is nodig omdat LVGL, GFX en touch-driver elkaar kunnen includeen
lib_ldf_mode = deep+

; Extra include-paden:
;   -I src                  → zoek headers ook in src/ (voor wifi_config.h, debug_log.h, etc.)
;   -I libraries            → nodig voor lv_conf.h (gevonden door LVGL via LV_CONF_INCLUDE_SIMPLE)
;   -I libraries/Mylibrary  → pin_config.h direct includeerbaar als "pin_config.h"
build_flags =
    -I src
    -I libraries
    -I libraries/Mylibrary
    ; Bekende fix voor arduino-esp32 3.x + PlatformIO: Network.h niet automatisch in pad
    -I/home/jack/.platformio/packages/framework-arduinoespressif32/libraries/Network/src
    -I/home/jack/.platformio/packages/framework-arduinoespressif32/libraries/NetworkClientSecure/src
    ; LV_CONF_INCLUDE_SIMPLE: laat LVGL zoeken naar lv_conf.h
    ; via het compiler include-pad (-I libraries) in plaats van de
    ; standaard relatieve ../.. pad (die naar de projectroot zou verwijzen)
    -D LV_CONF_INCLUDE_SIMPLE
    ; Arduino GFX: vertel welk bord we gebruiken (optioneel, voor optimalisaties)
    -D ARDUINO_ESP32C6_DEV
    ; Stackgrootte voor loop/setup task: standaard is 8192, verhoog voor LVGL+WiFi+BLE
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=16384

; ============================================================
; PARTITIE SCHEMA
; Default 8MB met OTA: 4MB app + 4MB voor storage/OTA
; Reden: genoeg ruimte voor LVGL v9 + GFX + WiFi + BLE code
; ============================================================
board_build.partitions = default_8MB.csv

; ============================================================
; EXTRA BIBLIOTHEEK OPTIES
; lib_archive = false: geen .a archief maken, snellere incremental builds
; ============================================================
lib_archive = false

; Zorg dat Network-bibliotheek bronbestanden gecompileerd worden (arduino-esp32 3.x fix)
; lib_extra_dirs voegt zoekpad toe maar compileert niet; lib_deps forceert compilatie
lib_extra_dirs =
    /home/jack/.platformio/packages/framework-arduinoespressif32/libraries/Network
lib_deps =
    /home/jack/.platformio/packages/framework-arduinoespressif32/libraries/Network

; ============================================================
; BRONBESTAND LOCATIE
; PlatformIO compileert alle bestanden in src/
; ============================================================
; src_dir = src  (standaard, niet nodig om te herhalen)
